name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14        # Apple Silicon runner
            target: darwin-arm64
            arch: arm64
          - os: macos-13        # Intel runner
            target: darwin-x86_64
            arch: x86_64
          - os: ubuntu-22.04
            target: linux-x86_64
            arch: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: client
        run: |
          pip install pyinstaller
          pip install .

      - name: Build binary
        working-directory: client
        run: |
          pyinstaller --onefile --name logographic-chat src/logographic_chat/cli.py

      - name: Package tarball
        working-directory: client/dist
        run: |
          tar -czf logographic-chat-${{ matrix.target }}.tar.gz logographic-chat

      - name: Compute SHA256
        id: sha
        working-directory: client/dist
        run: |
          echo "sha256=$(shasum -a 256 logographic-chat-${{ matrix.target }}.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/logographic-chat-${{ matrix.target }}.tar.gz

      - name: Store SHA256 as artifact
        run: |
          echo "${{ steps.sha.outputs.sha256 }}  logographic-chat-${{ matrix.target }}.tar.gz" > sha256-${{ matrix.target }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: sha256-${{ matrix.target }}.txt

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          merge-multiple: true

      - name: Parse SHA256 values
        id: shas
        run: |
          echo "arm64=$(awk '{print $1}' sha256-darwin-arm64.txt)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(awk '{print $1}' sha256-darwin-x86_64.txt)" >> "$GITHUB_OUTPUT"
          echo "linux=$(awk '{print $1}' sha256-linux-x86_64.txt)" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        env:
          TAG: ${{ github.ref_name }}
          SHA_ARM64: ${{ steps.shas.outputs.arm64 }}
          SHA_X86_64: ${{ steps.shas.outputs.x86_64 }}
          SHA_LINUX: ${{ steps.shas.outputs.linux }}
        run: |
          VERSION="${TAG#v}"
          sed \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|SHA256_ARM64_PLACEHOLDER|${SHA_ARM64}|g" \
            -e "s|SHA256_X86_64_PLACEHOLDER|${SHA_X86_64}|g" \
            -e "s|SHA256_LINUX_PLACEHOLDER|${SHA_LINUX}|g" \
            -e "s|TAG_PLACEHOLDER|${TAG}|g" \
            client/build/logographic-chat.rb > formula-output.rb

      - name: Push formula to tap repo
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/ike5/homebrew-logographic-chat.git tap-repo
          mkdir -p tap-repo/Formula
          cp formula-output.rb tap-repo/Formula/logographic-chat.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/logographic-chat.rb
          git commit -m "Update formula for ${TAG}"
          git push
