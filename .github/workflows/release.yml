name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14        # Apple Silicon runner
            target: darwin-arm64
          - os: ubuntu-22.04
            target: linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: client
        run: |
          pip install pyinstaller
          pip install .

      - name: Build binary
        working-directory: client
        run: |
          pyinstaller --onefile --name logographic-chat src/logographic_chat/cli.py

      - name: Package tarball
        working-directory: client/dist
        run: |
          tar -czf logographic-chat-${{ matrix.target }}.tar.gz logographic-chat

      - name: Compute SHA256
        id: sha
        working-directory: client/dist
        run: |
          echo "sha256=$(shasum -a 256 logographic-chat-${{ matrix.target }}.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: client/dist/logographic-chat-${{ matrix.target }}.tar.gz

      - name: Store SHA256 as artifact
        run: |
          echo "${{ steps.sha.outputs.sha256 }}  logographic-chat-${{ matrix.target }}.tar.gz" > sha256-${{ matrix.target }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.target }}
          path: sha256-${{ matrix.target }}.txt

  update-formula:
    name: Update Homebrew formula
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: sha256-*
          merge-multiple: true

      - name: Parse SHA256 values
        id: shas
        run: |
          echo "arm64=$(awk '{print $1}' sha256-darwin-arm64.txt)" >> "$GITHUB_OUTPUT"
          echo "linux=$(awk '{print $1}' sha256-linux-x86_64.txt)" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        env:
          TAG: ${{ github.ref_name }}
          SHA_ARM64: ${{ steps.shas.outputs.arm64 }}
          SHA_LINUX: ${{ steps.shas.outputs.linux }}
        run: |
          VERSION="${TAG#v}"
          sed \
            -e "s|VERSION_PLACEHOLDER|${VERSION}|g" \
            -e "s|SHA256_ARM64_PLACEHOLDER|${SHA_ARM64}|g" \
            -e "s|SHA256_LINUX_PLACEHOLDER|${SHA_LINUX}|g" \
            -e "s|TAG_PLACEHOLDER|${TAG}|g" \
            client/build/logographic-chat.rb > formula-output.rb

      - name: Push formula to tap repo
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          FILE_SHA=$(gh api repos/ike5/homebrew-logographic-chat/contents/Formula/logographic-chat.rb \
            --jq '.sha' 2>/dev/null || echo "")
          CONTENT=$(base64 -w0 formula-output.rb)
          if [ -n "$FILE_SHA" ]; then
            gh api repos/ike5/homebrew-logographic-chat/contents/Formula/logographic-chat.rb \
              --method PUT \
              -f message="Update formula for ${TAG}" \
              -f content="${CONTENT}" \
              -f sha="${FILE_SHA}"
          else
            gh api repos/ike5/homebrew-logographic-chat/contents/Formula/logographic-chat.rb \
              --method PUT \
              -f message="Update formula for ${TAG}" \
              -f content="${CONTENT}"
          fi
